<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>抢答比赛 · 教师统计台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden}
body{height:100%;overflow:hidden;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0d0d1a;color:#fff;font-size:16px}
/* ===== 题目区（顶部全宽，高度随内容）===== */
#cardQ{width:100%;background:#13132a;border-bottom:2px solid #2a2a4a;padding:8px 14px;flex-shrink:0}
.q-prog{font-size:15px;color:#aaa;margin-bottom:4px}
.q-text{font-size:32px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:6px}
.q-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.q-opt{background:#1e1e3a;border-radius:6px;padding:4px 10px;font-size:32px;display:flex;align-items:center;gap:6px;border:1px solid transparent;color:#fff}
.q-opt.correct{background:#2ed57315;border-color:#2ed573;color:#2ed573}
.q-opt .ol{font-weight:700;flex-shrink:0}
.q-quickinfo{display:none;margin-top:6px;padding:6px 10px;background:#1a1a30;border-radius:7px;flex-wrap:wrap;gap:8px 24px;align-items:center}
.q-quickinfo span.lbl{font-size:16px;color:#aaa}
.q-quickinfo span.val{font-size:32px;font-weight:900}
.q-pbar-wrap{height:5px;background:#1e1e3a;border-radius:3px;overflow:hidden;margin-top:6px}
.q-pbar-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,#6c63ff,#42a5f5);transition:width .4s}
/* ===== 统计区（网格）===== */
#statsGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px;flex:1;min-height:0;overflow:hidden}
.card{background:#13132a;border:1px solid #2a2a4a;border-radius:8px;padding:6px 8px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.ch{font-size:14px;font-weight:700;color:#aaa;letter-spacing:.4px;margin-bottom:4px;flex-shrink:0;text-transform:uppercase}
.scroll{overflow-y:auto;flex:1;min-height:0}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:#3a3a5c;border-radius:2px}
.empty{text-align:center;color:#aaa;padding:10px;font-size:15px}
/* 作答统计 */
.bignum{font-size:28px;font-weight:900;line-height:1;text-align:center}
.biglabel{font-size:14px;color:#aaa;text-align:center;margin-top:1px}
.ans-row{display:flex;gap:6px;align-items:stretch;justify-content:center}
.ans-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1e1e3a;border-radius:6px;padding:5px}
/* 表格 */
.tbl{width:100%;border-collapse:collapse;flex:1;min-height:0}
.tbl th{color:#aaa;font-weight:600;padding:2px 4px;font-size:14px;text-align:left;border-bottom:1px solid #2a2a4a;position:sticky;top:0;background:#13132a}
.tbl td{padding:3px 4px;font-size:16px;border-bottom:1px solid #1a1a30;color:#fff}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.rank1 td{font-size:21px;font-weight:800}
.r1{color:#ffd700}.r2{color:#c0c0c0}.r3{color:#cd7f32}
/* 条形图 */
.mini-bar-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.mini-bar-label{text-align:right;font-size:16px;color:#fff;white-space:nowrap;flex-shrink:0}
.mini-bar-label.rank1{font-size:21px;font-weight:800;color:#ffd700}
.mini-bar-wrap{flex:1;height:16px;background:#1e1e3a;border-radius:3px;overflow:hidden;position:relative}
.mini-bar-fill{height:16px;border-radius:3px;background:linear-gradient(90deg,#6c63ff,#42a5f5);transition:width .4s}
.mini-bar-fill.gold{background:linear-gradient(90deg,#ffd700,#ffb300)}
.mini-bar-val{position:absolute;right:4px;top:0;line-height:16px;font-size:14px;color:#fff;font-weight:700}
/* 进度条 */
.pbar-wrap{height:6px;background:#1e1e3a;border-radius:3px;overflow:hidden;margin-top:2px}
.pbar-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#6c63ff,#42a5f5);transition:width .4s}
/* ===== 底部标题栏 ===== */
.topbar{display:flex;align-items:center;gap:8px;padding:4px 10px;background:#13132a;border-top:1px solid #2a2a4a;height:40px;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700;color:#fff;white-space:nowrap}
select{background:#1e1e3a;color:#fff;border:1px solid #3a3a5c;border-radius:6px;padding:3px 8px;font-size:15px;height:28px;max-width:230px}
.btn{border:none;border-radius:6px;padding:0 10px;font-size:15px;font-weight:600;cursor:pointer;height:28px;white-space:nowrap;transition:.15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.b-init{background:linear-gradient(135deg,#2ed573,#26c96a);color:#fff}
.b-prev{background:#2a2a4a;color:#fff}
.b-next{background:linear-gradient(135deg,#6c63ff,#42a5f5);color:#fff}
.b-end{background:linear-gradient(135deg,#ff4b4b,#ef5350);color:#fff}
.b-ref{background:#1e1e3a;color:#fff;border:1px solid #3a3a5c}
.badge{border-radius:10px;padding:2px 8px;font-size:14px;font-weight:700}
.bw{background:#2a2a4a;color:#fff}
.br{background:#2ed57320;color:#2ed573;border:1px solid #2ed573}
.be{background:#ff4b4b20;color:#ff4b4b;border:1px solid #ff4b4b}
.sep{flex:1}
.clock{font-size:15px;color:#fff;white-space:nowrap}
/* ===== 结束浮层 ===== */
#endOverlay{display:none;position:fixed;inset:0;background:#0d0d1aee;z-index:99;overflow-y:auto;padding:20px}
#endOverlay h2{text-align:center;font-size:22px;margin-bottom:12px;color:#fff}
.eo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:900px;margin:0 auto}
.eo-card{background:#13132a;border:1px solid #2a2a4a;border-radius:8px;padding:10px}
.eo-card h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:7px 16px;border-radius:20px;font-size:16px;z-index:999;display:none}
</style>
</head>
<body>

<!-- 题目区：顶部全宽，高度随内容 -->
<div id="cardQ">
  <div class="q-prog" id="qProg"></div>
  <div class="q-text" id="qText">等待开始…</div>
  <div class="q-opts" id="qOpts"></div>
  <div class="q-quickinfo" id="qQuickInfo">
    <div><span class="lbl">⚡ 最快答对：</span><span class="val" id="qFastestName" style="color:#ffd700">—</span></div>
    <div><span class="lbl">🏆 最高正确率组：</span><span class="val" id="qTopGroupName" style="color:#2ed573">—</span></div>
  </div>
  <div class="q-pbar-wrap"><div id="qPbar" class="q-pbar-fill"></div></div>
</div>

<!-- 统计区：3列网格 -->
<div id="statsGrid">

  <!-- 本题作答情况 -->
  <div class="card" style="flex-direction:row;align-items:center;gap:8px">
    <div class="ch" style="margin:0;white-space:nowrap">📊 本题作答</div>
    <div class="ans-row" style="flex:1">
      <div class="ans-box">
        <div class="bignum" style="color:#2ed573" id="numAnswered">0</div>
        <div class="biglabel">已答</div>
      </div>
      <div class="ans-box">
        <div class="bignum" style="color:#fff" id="numUnanswered">0</div>
        <div class="biglabel">未答</div>
      </div>
      <div class="ans-box" style="flex:none;width:54px;padding:2px">
        <svg width="48" height="48" viewBox="0 0 50 50" style="overflow:visible">
          <circle cx="25" cy="25" r="20" fill="none" stroke="#1e1e3a" stroke-width="6"/>
          <circle id="ringCircle" cx="25" cy="25" r="20" fill="none" stroke="#2ed573" stroke-width="6"
            stroke-dasharray="0 125.66" stroke-linecap="round" transform="rotate(-90 25 25)" style="transition:.4s"/>
        </svg>
        <div id="ringPct" class="biglabel" style="margin-top:-2px">0%</div>
      </div>
    </div>
  </div>

  <!-- 本题最快答对 TOP5 -->
  <div class="card">
    <div class="ch">⚡ 本题最快答对 TOP5</div>
    <div class="scroll">
      <table class="tbl">
        <thead><tr><th>#</th><th>姓名</th><th>组别</th><th style="text-align:right">用时</th></tr></thead>
        <tbody id="tbodyFastest"><tr><td colspan="4" class="empty">暂无</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 本题各组正确率 -->
  <div class="card">
    <div class="ch">🎆 本题各组正确率</div>
    <div class="scroll" id="grpAccWrap"><div class="empty">暂无</div></div>
  </div>

  <!-- 整体学生正确率 -->
  <div class="card">
    <div class="ch">🎓 整体学生正确率</div>
    <div class="scroll">
      <table class="tbl">
        <thead><tr><th>#</th><th>姓名</th><th style="text-align:right">正确率</th></tr></thead>
        <tbody id="tbodyStu"><tr><td colspan="3" class="empty">暂无</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 整体组别排行 -->
  <div class="card">
    <div class="ch">🏆 整体组别排行</div>
    <div class="scroll" id="grpRankWrap"><div class="empty">暂无</div></div>
  </div>

  <!-- 最低正确率题目 -->
  <div class="card">
    <div class="ch">🔴 最低正确率题目</div>
    <div class="scroll">
      <table class="tbl">
        <thead><tr><th>题号</th><th>题目</th><th style="text-align:right">正确率</th></tr></thead>
        <tbody id="tbodyWorst"><tr><td colspan="3" class="empty">暂无</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<!-- 底部标题栏 -->
<div class="topbar">
  <h1>🏆 抢答统计台</h1>
  <select id="examSel" onchange="onExamChange()"><option value="">-- 选择比赛 --</option></select>
  <button class="btn b-ref" onclick="loadExamList()">&#8635;</button>
  <span id="statusBadge" class="badge bw">未选择</span>
  <span id="progText" style="font-size:15px;color:#fff"></span>
  <span class="sep"></span>
  <button class="btn b-init" id="btnInit" onclick="doInit()" disabled>▶ 开始</button>
  <button class="btn b-prev" id="btnPrev" onclick="doPrev()" disabled>◀</button>
  <button class="btn b-next" id="btnNext" onclick="doNext()" disabled>下一题 ▶</button>
  <button class="btn b-end"  id="btnEnd"  onclick="doEnd()"  disabled>⏹ 结束</button>
  <span class="clock" id="clock"></span>
</div>

<!-- 结束浮层 -->
<div id="endOverlay">
  <h2>🏆 比赛结束 · 总结</h2>
  <div class="eo-grid">
    <div class="eo-card">
      <h3>🥇 学生正确率排行</h3>
      <div id="eoStu"></div>
    </div>
    <div class="eo-card">
      <h3>🎆 组别正确率排行</h3>
      <div id="eoGrp"></div>
    </div>
    <div class="eo-card" style="grid-column:span 2">
      <h3>🔴 最难题目（正确率最低）</h3>
      <div id="eoWorst"></div>
    </div>
  </div>
  <div style="text-align:center;margin-top:16px;display:flex;gap:16px;justify-content:center">
    <button class="btn b-init" style="height:36px;font-size:16px;padding:0 20px" onclick="doRestart()">🔄 重新比赛</button>
    <button class="btn b-prev" style="height:36px;font-size:16px;padding:0 20px" onclick="window._summaryDismissed=true;document.getElementById('endOverlay').style.display='none'">↩ 返回</button>
  </div>
</div>

<div id="toast"></div>

<script>
var currentExamId=null,pollTimer=null,lastStats=null,isPolling=false;
var CIRC=2*Math.PI*20;

(function tick(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  document.getElementById('clock').textContent=(h<10?'0'+h:h)+':'+(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
  setTimeout(tick,1000);
})();

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(t._tid);t._tid=setTimeout(function(){t.style.display='none';},2200);
}

function api(url,method,body,cb,errCb){
  var xhr=new XMLHttpRequest();xhr.open(method||'GET',url,true);
  xhr.setRequestHeader('Content-Type','application/json;charset=utf-8');
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    var d;try{d=JSON.parse(xhr.responseText);}catch(e){d={};}
    if(xhr.status>=200&&xhr.status<300){if(cb)cb(d);}
    else{if(errCb)errCb(d.error||d.message||'请求失败');}
  };
  xhr.send(body?JSON.stringify(body):null);
}

function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pct(c,t){return t>0?Math.round(c/t*100):0;}

function loadExamList(){
  api('/api/buzzer/list','GET',null,function(data){
    var sel=document.getElementById('examSel');
    var prev=sel.value;
    while(sel.options.length>1)sel.remove(1);
    var exams=data.contests||[];
    exams.forEach(function(e){
      var opt=document.createElement('option');
      opt.value=e.id;
      var st=e.isEnded?'[已结束]':(e.isStarted?'[进行中]':'[未开始]');
      opt.textContent=(e.bankName||'比赛#'+e.id)+' '+st;
      sel.appendChild(opt);
    });
    if(prev&&exams.some(function(e){return String(e.id)===prev;})){sel.value=prev;}
    if(!prev&&exams.length>0){sel.value=exams[0].id;onExamChange();}
    if(exams.length===0)showToast('暂无抢答比赛');
  },function(e){showToast('加载失败:'+e);});
}

function onExamChange(){
  var v=document.getElementById('examSel').value;
  if(!v){currentExamId=null;stopPoll();return;}
  currentExamId=parseInt(v);
  startPoll();
}

function startPoll(){stopPoll();fetchStats();pollTimer=setInterval(fetchStats,2000);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

function fetchStats(){
  if(!currentExamId||isPolling)return;isPolling=true;
  api('/api/buzzer/stats?examId='+currentExamId,'GET',null,function(data){
    isPolling=false;lastStats=data;renderStats(data);
  },function(){isPolling=false;});
}

function renderStats(data){
  var s=data.state||{};
  var qIdx=s.currentQuestionIndex!==undefined?s.currentQuestionIndex:-1;
  var isStarted=s.isStarted,isEnded=s.isEnded;
  var totalQ=data.totalQuestions||0;

  var badge=document.getElementById('statusBadge');
  if(isEnded){badge.className='badge be';badge.textContent='已结束';}
  else if(isStarted){badge.className='badge br';badge.textContent='进行中';}
  else{badge.className='badge bw';badge.textContent='未开始';}
  document.getElementById('progText').textContent=
    (isStarted&&!isEnded&&totalQ>0)?('第'+(qIdx+1)+'/'+totalQ+'题'):(totalQ?'共'+totalQ+'题':'');

  var btnInit=document.getElementById('btnInit');
  btnInit.disabled=false;
  btnInit.textContent=isStarted?'\u21ba 重置':'\u25b6 开始';
  document.getElementById('btnPrev').disabled=!isStarted||isEnded||qIdx<=0;
  document.getElementById('btnNext').disabled=!isStarted||isEnded||(totalQ>0&&qIdx>=totalQ-1);
  document.getElementById('btnEnd').disabled=isEnded;

  renderQuestion(data.currentQuestion||{},qIdx,totalQ);

  var ac=data.answerCount||{};
  var answered=ac.answered||0,unanswered=ac.unanswered||0,total=answered+unanswered;
  var p=pct(answered,total);
  document.getElementById('numAnswered').textContent=answered;
  document.getElementById('numUnanswered').textContent=unanswered;
  document.getElementById('ringPct').textContent=p+'%';
  var ring=document.getElementById('ringCircle');
  ring.setAttribute('stroke-dasharray',(CIRC*p/100).toFixed(1)+' '+CIRC.toFixed(1));
  ring.setAttribute('stroke',p>0?'#2ed573':'#1e1e3a');

  var fastList=data.fastestCorrect||[];
  var grpAccList=data.groupAccuracy||[];
  renderFastest(fastList);
  renderGroupAcc(grpAccList);

  var qi=document.getElementById('qQuickInfo');
  var fnEl=document.getElementById('qFastestName');
  var gnEl=document.getElementById('qTopGroupName');
  if(fastList.length||grpAccList.length){
    qi.style.display='flex';
    fnEl.textContent=fastList.length?(fastList[0].displayName||'—'):'—';
    gnEl.textContent=grpAccList.length?(grpAccList[0].groupName||'—'):'—';
  }else{qi.style.display='none';}

  renderStuRank(data.overallStudentRanking||[]);
  renderGrpRank(data.overallGroupRanking||[]);
  renderWorst(data.worstQuestions||[]);

  if(isEnded){
    var ov=document.getElementById('endOverlay');
    if(!window._summaryDismissed&&ov.style.display!=='block'){ov.style.display='block';renderSummary(data);}
  }else{
    document.getElementById('endOverlay').style.display='none';
    window._summaryDismissed=false;
  }
}

function renderQuestion(cq,qIdx,totalQ){
  if(!cq||!cq.content){
    document.getElementById('qText').textContent='等待出题\u2026';
    document.getElementById('qOpts').innerHTML='';
    document.getElementById('qProg').textContent='';
    document.getElementById('qPbar').style.width='0%';
    return;
  }
  document.getElementById('qProg').textContent='第'+(qIdx+1)+' / '+totalQ+' 题';
  document.getElementById('qPbar').style.width=pct(qIdx+1,totalQ)+'%';
  document.getElementById('qText').textContent=cq.content;
  var opts=cq.options||[];
  document.getElementById('qOpts').innerHTML=opts.map(function(o,i){
    var letter=String.fromCharCode(65+i);
    var isC=(o===cq.correctAnswer);
    var cleanO=o.replace(/^[A-Da-d][.、．\s]+/,'');
    return '<div class="q-opt'+(isC?' correct':'')+'"><span class="ol">'+letter+'.</span><span>'+esc(cleanO)+'</span></div>';
  }).join('');
}

function renderFastest(list){
  var tbody=document.getElementById('tbodyFastest');
  if(!list.length){tbody.innerHTML='<tr><td colspan="4" class="empty">暂无正确作答</td></tr>';return;}
  tbody.innerHTML=list.slice(0,5).map(function(r,i){
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    var isFirst=i===0;
    return '<tr'+(isFirst?' class="rank1"':'')+'>'+
      '<td class="'+rc+'">'+(i+1)+'</td>'+
      '<td>'+esc(r.displayName)+'</td>'+
      '<td style="color:#aaa">'+esc(r.groupName||'-')+'</td>'+
      '<td style="text-align:right;color:#aaa">'+(r.answerTimeMs?r.answerTimeMs+'ms':'-')+'</td></tr>';
  }).join('');
}

function renderGroupAcc(list){
  var el=document.getElementById('grpAccWrap');
  if(!list.length){el.innerHTML='<div class="empty">暂无数据</div>';return;}
  el.innerHTML=list.slice(0,6).map(function(r,i){
    var p=pct(r.correct||0,r.total||0);
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    var isFirst=i===0;
    return '<div class="mini-bar-row">'+
      '<span class="mini-bar-label'+(isFirst?' rank1':'')+' '+rc+'">'+esc(r.groupName||'未分组')+'</span>'+
      '<div class="mini-bar-wrap"><div class="mini-bar-fill gold" style="width:'+p+'%"></div>'+
      '<span class="mini-bar-val">'+p+'%</span></div></div>';
  }).join('');
}

function renderStuRank(list){
  var tbody=document.getElementById('tbodyStu');
  if(!list.length){tbody.innerHTML='<tr><td colspan="3" class="empty">暂无</td></tr>';return;}
  tbody.innerHTML=list.slice(0,12).map(function(r,i){
    var p=pct(r.correct||0,r.total||0);
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    var isFirst=i===0;
    return '<tr'+(isFirst?' class="rank1"':'')+'>'+
      '<td class="'+rc+'">'+(i+1)+'</td>'+
      '<td>'+esc(r.displayName)+'</td>'+
      '<td style="text-align:right">'+
        '<span style="color:'+(p>=60?'#2ed573':'#ff4b4b')+'">'+p+'%</span>'+
        ' <span style="color:#aaa;font-size:13px">'+r.correct+'/'+r.total+'</span>'+
      '</td></tr>';
  }).join('');
}

function renderGrpRank(list){
  var el=document.getElementById('grpRankWrap');
  if(!list.length){el.innerHTML='<div class="empty">暂无数据</div>';return;}
  el.innerHTML=list.slice(0,6).map(function(r,i){
    var p=pct(r.correct||0,r.total||0);
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    var isFirst=i===0;
    return '<div class="mini-bar-row">'+
      '<span class="mini-bar-label'+(isFirst?' rank1':'')+' '+rc+'">'+esc(r.groupName||'未分组')+'</span>'+
      '<div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:'+p+'%"></div>'+
      '<span class="mini-bar-val">'+p+'%</span></div></div>';
  }).join('');
}

function renderWorst(list){
  var tbody=document.getElementById('tbodyWorst');
  if(!list.length){tbody.innerHTML='<tr><td colspan="3" class="empty">暂无数据</td></tr>';return;}
  tbody.innerHTML=list.slice(0,5).map(function(r,i){
    var p=pct(r.correct||0,r.total||0);
    var short=r.questionPreview||'';
    var isFirst=i===0;
    return '<tr'+(isFirst?' class="rank1"':'')+'>'+
      '<td style="white-space:nowrap">第'+(r.questionIndex+1)+'题</td>'+
      '<td>'+esc(short)+'</td>'+
      '<td style="text-align:right;color:#ff4b4b;font-weight:700">'+p+'%</td></tr>';
  }).join('');
}

function renderSummary(data){
  var stuList=data.overallStudentRanking||[];
  var grpList=data.overallGroupRanking||[];
  var worstList=data.worstQuestions||[];
  document.getElementById('eoStu').innerHTML=stuList.slice(0,15).map(function(r,i){
    var p=pct(r.correct||0,r.total||0);
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    return '<div class="mini-bar-row"><span class="mini-bar-label '+rc+'">'+(i+1)+'.'+esc(r.displayName)+'</span>'+
      '<div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:'+p+'%"></div>'+
      '<span class="mini-bar-val">'+p+'%</span></div></div>';
  }).join('')||'<div class="empty">暂无</div>';
  document.getElementById('eoGrp').innerHTML=grpList.slice(0,8).map(function(r,i){
    var p=pct(r.correct||0,r.total||0);
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    return '<div class="mini-bar-row"><span class="mini-bar-label '+rc+'">'+esc(r.groupName||'未分组')+'</span>'+
      '<div class="mini-bar-wrap"><div class="mini-bar-fill gold" style="width:'+p+'%"></div>'+
      '<span class="mini-bar-val">'+p+'%</span></div></div>';
  }).join('')||'<div class="empty">暂无</div>';
  document.getElementById('eoWorst').innerHTML=worstList.slice(0,5).map(function(r){
    var p=pct(r.correct||0,r.total||0);
    var short=r.questionPreview||'';
    return '<div style="margin-bottom:6px;display:flex;align-items:baseline;gap:6px">'+
      '<span style="flex-shrink:0;color:#ff4b4b;font-weight:700;font-size:15px">第'+(r.questionIndex+1)+'题</span>'+
      '<span style="flex:1;color:#fff;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(short)+'</span>'+
      '<span style="flex-shrink:0;color:#ff4b4b;font-weight:700;font-size:15px;margin-left:6px">'+p+'%</span></div>';
  }).join('')||'<div class="empty">暂无</div>';
}

function doInit(){
  if(!currentExamId)return;
  var isStarted=lastStats&&lastStats.state&&lastStats.state.isStarted;
  if(isStarted&&!confirm('重置比赛将清除所有答题记录，确定？'))return;
  api('/api/buzzer/init','POST',{examId:currentExamId},function(){
    showToast(isStarted?'已重置':'已开始！');fetchStats();
  },function(e){showToast('失败:'+e);});
}
function doPrev(){
  if(!currentExamId||!lastStats)return;
  var qi=(lastStats.state||{}).currentQuestionIndex||0;if(qi<=0)return;
  api('/api/buzzer/question','POST',{examId:currentExamId,index:qi-1},function(){fetchStats();},function(e){showToast(e);});
}
function doNext(){
  if(!currentExamId||!lastStats)return;
  var qi=(lastStats.state||{}).currentQuestionIndex;if(qi===undefined)qi=-1;
  var tq=lastStats.totalQuestions||0;
  if(tq>0&&qi>=tq-1){showToast('已是最后一题');return;}
  api('/api/buzzer/question','POST',{examId:currentExamId,index:qi+1},function(){fetchStats();},function(e){showToast(e);});
}
function doEnd(){
  if(!currentExamId)return;
  if(!confirm('确定结束比赛？'))return;
  api('/api/buzzer/end','POST',{examId:currentExamId},function(){showToast('比赛结束！');fetchStats();},function(e){showToast(e);});
}
function doRestart(){
  if(!currentExamId)return;
  if(!confirm('重新比赛将清除所有答题记录并从第一题开始，确定？'))return;
  document.getElementById('endOverlay').style.display='none';
  api('/api/buzzer/init','POST',{examId:currentExamId},function(){
    showToast('比赛已重新开始！');fetchStats();
  },function(e){showToast('失败:'+e);});
}

loadExamList();
</script>
</body>
</html>
